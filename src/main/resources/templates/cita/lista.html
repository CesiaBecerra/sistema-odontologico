<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Citas | Digital Dentic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">

    <!-- Botón Volver -->
    <div class="mb-3">
        <button class="btn btn-light btn-sm" onclick="history.back()">
            <i class="bi bi-arrow-left"></i> Volver
        </button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📅 Listado de Citas</h2>

        <!-- 🔐 SOLO ADMIN, SECRETARIO, DOCTOR -->
        <a th:href="@{/cita/reservar}"
           class="btn btn-primary"
           th:if="${#authorization.expression('hasAnyRole(''ADMIN'',''SECRETARIO'',''DOCTOR'')')}">
            <i class="bi bi-plus-circle"></i> Nueva Cita
        </a>
    </div>

    <div class="card shadow border-0">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Doctor</th>
                    <th>Estado</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>

                <tr th:each="c : ${citas}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${#temporals.format(c.fechaHora,'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${c.doctor.nombre}"></td>

                    <!-- BADGES -->
                    <td>
                        <span th:if="${c.estado.name() == 'RESERVADA'}"
                              class="badge bg-primary">Reservada</span>

                        <span th:if="${c.estado.name() == 'ATENDIDA'}"
                              class="badge bg-success">Atendida</span>

                        <span th:if="${c.estado.name() == 'CANCELADA'}"
                              class="badge bg-danger">Cancelada</span>
                    </td>

                    <td class="text-center">

                        <!-- 🔐 SOLO SI TIENE PERMISO -->
                        <form th:if="${#authorization.expression('hasAnyRole(''ADMIN'',''SECRETARIO'',''DOCTOR'')')}"
                              th:action="@{/cita/actualizar-estado}"
                              method="post"
                              class="d-inline">

                            <!-- CSRF -->
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />

                            <input type="hidden" name="id"
                                   th:value="${c.id}" />

                            <select name="estado"
                                    class="form-select form-select-sm d-inline w-auto">

                                <!-- DOCTOR -->
                                <option value="ATENDIDA"
                                        th:if="${#authorization.expression('hasRole(''DOCTOR'')')}">
                                    Atendida
                                </option>

                                <!-- SECRETARIO -->
                                <option value="CANCELADA"
                                        th:if="${#authorization.expression('hasRole(''SECRETARIO'')')}">
                                    Cancelada
                                </option>

                                <!-- ADMIN -->
                                <option value="RESERVADA"
                                        th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                                    Reservada
                                </option>

                                <option value="ATENDIDA"
                                        th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                                    Atendida
                                </option>

                                <option value="CANCELADA"
                                        th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                                    Cancelada
                                </option>

                            </select>

                            <button type="submit"
                                    class="btn btn-sm btn-outline-success ms-1">
                                Actualizar
                            </button>
                        </form>

                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(citas)}">
                    <td colspan="5" class="text-center text-muted">
                        No hay citas registradas
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
