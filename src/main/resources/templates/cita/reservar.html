<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Cita | Digital Dentic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body{ background:#f4f6f9; }
        .card-custom{ border:none; border-radius:15px; box-shadow:0 8px 18px rgba(0,0,0,0.08); }
        .form-label{ font-weight:500; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="card card-custom p-4 col-md-7 mx-auto">

        <!-- Botón Volver -->
        <div class="mb-3">
            <button class="btn btn-light btn-sm" onclick="history.back()">
                <i class="bi bi-arrow-left"></i> Volver
            </button>
        </div>

        <h3 class="mb-4 text-center">
            <i class="bi bi-calendar-plus text-success"></i> Registrar Nueva Cita
        </h3>

        <!-- Mostrar error si ya existe cita -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/cita/guardar}" method="post" th:object="${cita}">

            <!-- Nombre -->
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person"></i> Nombre del Paciente</label>
                <input type="text" class="form-control" th:field="*{nombrePaciente}" required>
            </div>

            <!-- Teléfono -->
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-telephone"></i> Teléfono</label>
                <input type="text" class="form-control" th:field="*{telefono}" required>
            </div>

            <!-- Motivo -->
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-chat-left-text"></i> Motivo de Consulta</label>
                <textarea class="form-control" rows="3" th:field="*{motivoConsulta}" required></textarea>
            </div>

            <!-- Doctor -->
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person-badge"></i> Doctor</label>
                <select class="form-select" name="doctorId" required>
                    <option value="">Seleccione</option>
                    <option th:each="doc : ${doctores}" th:value="${doc.id}" th:text="${doc.nombre}"
                        th:selected="${cita.doctor != null} ? ${doc.id} == ${cita.doctor.id} : false"></option>
                </select>
            </div>

            <!-- Fecha -->
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-calendar-date"></i> Fecha</label>
                <input type="date" id="fecha" class="form-control" required>
                <div id="fecha-error" class="text-danger small mt-1 d-none">No se puede seleccionar sábados</div>
            </div>

            <!-- Hora -->
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-clock"></i> Hora</label>
                <select id="hora" class="form-select" required>
                    <option value="">Seleccione</option>
                    <option value="08:00">08:00 AM</option>
                    <option value="09:00">09:00 AM</option>
                    <option value="10:00">10:00 AM</option>
                    <option value="11:00">11:00 AM</option>
                    <option value="12:00">12:00 PM</option>
                    <option value="13:00">01:00 PM</option>
                    <option value="14:00">02:00 PM</option>
                    <option value="15:00">03:00 PM</option>
                    <option value="16:00">04:00 PM</option>
                    <option value="17:00">05:00 PM</option>
                    <option value="18:00">06:00 PM</option>
                </select>
            </div>

            <!-- Campo oculto para enviar LocalDateTime -->
            <input type="hidden" th:field="*{fechaHora}" id="fechaHoraFinal">

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="bi bi-check-circle"></i> Confirmar Reserva
                </button>
            </div>
        </form>
    </div>
</div>

<script>
const hoy = new Date().toISOString().split("T")[0];
const inputFecha = document.getElementById("fecha");
const fechaError = document.getElementById("fecha-error");

// Fecha mínima hoy
inputFecha.setAttribute("min", hoy);

// Función para validar si es sábado
function esSabado(fechaStr) {
    const fecha = new Date(fechaStr + "T00:00");
    return fecha.getDay() === 6;
}

// Bloquear sábados al seleccionar
inputFecha.addEventListener("input", function() {
    if (esSabado(this.value)) {
        fechaError.classList.remove("d-none");
        this.value = "";
    } else {
        fechaError.classList.add("d-none");
    }
});

// Validación final al enviar
document.querySelector("form").addEventListener("submit", function(e) {
    let fecha = inputFecha.value;
    let hora = document.getElementById("hora").value;

    if (!fecha || !hora) {
        alert("Debe seleccionar fecha y hora");
        e.preventDefault();
        return;
    }

    if (esSabado(fecha)) {
        alert("No se pueden reservar citas los sábados");
        e.preventDefault();
        return;
    }

    // Combinar fecha y hora para LocalDateTime
    document.getElementById("fechaHoraFinal").value = `${fecha}T${hora}`;
});
</script>
</body>
</html>
