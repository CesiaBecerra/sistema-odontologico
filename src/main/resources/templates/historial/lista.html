<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Historial Clínico</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0"
                th:text="'Historial de ' + ${paciente.nombres} + ' ' + ${paciente.apellidos}">
            </h4>

            <a class="btn btn-success btn-sm"
               th:href="@{/historial/nuevo/{id}(id=${paciente.id})}">
                ➕ Nuevo Historial
            </a>
        </div>

        <div class="card-body">

            <!-- TABLA SOLO SI HAY REGISTROS -->
            <div class="table-responsive" th:if="${!#lists.isEmpty(historial)}">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha</th>
                            <th>Diagnóstico</th>
                            <th>Plan</th>
                            <th>Costo</th>
                            <th>Estado</th>
                            <th>Deuda</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="h : ${historial}">

                            <td th:text="${h.fecha != null ? #temporals.format(h.fecha, 'dd/MM/yyyy') : ''}"></td>

                            <td th:text="${h.diagnostico}"></td>

                            <td th:text="${h.planTratamiento}"></td>

                            <!-- COSTO -->
                            <td th:text="${h.costoTratamiento != null ? 'S/ ' + #numbers.formatDecimal(h.costoTratamiento,1,2) : 'S/ 0.00'}"></td>

                            <!-- ESTADO -->
                            <td>
                                <span class="badge"
                                      th:classappend="${h.estadoPago == 'PAGADO'} ? ' bg-success' :
                                                      (${h.estadoPago == 'PARCIAL'} ? ' bg-warning' : ' bg-danger')"
                                      th:text="${h.estadoPago}">
                                </span>
                            </td>

                            <!-- DEUDA -->
                            <td class="fw-bold text-danger"
                                th:text="${h.saldo != null ? 'S/ ' + #numbers.formatDecimal(h.saldo,1,2) : 'S/ 0.00'}">
                            </td>

                            <!-- ACCIONES -->
                            <td>

                                <a class="btn btn-primary btn-sm"
                                   th:href="@{/historial/ver/{id}(id=${h.id})}">
                                    👁 Ver
                                </a>

                                <a class="btn btn-success btn-sm"
                                   th:href="@{/odontograma/historial/{id}(id=${h.id})}">
                                    🦷 Odontograma
                                </a>

                            </td>

                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- MENSAJE SI NO HAY REGISTROS -->
            <div th:if="${#lists.isEmpty(historial)}" class="alert alert-info">
                No hay registros de historial para este paciente.
            </div>

            <a th:href="@{/pacientes}" class="btn btn-secondary mt-3">
                ⬅ Volver
            </a>

        </div>
    </div>

</div>

</body>
</html>
