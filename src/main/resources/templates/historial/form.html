<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrar Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Registrar Historial Clínico</h4>
            <div th:if="${historial.id != null}">
                <a class="btn btn-light btn-sm"
                   th:href="@{/odontograma/historial/{id}(id=${historial.id})}">🦷 Ver Odontograma</a>
            </div>
        </div>

        <div class="card-body">

            <!-- ERROR BACKEND -->
            <div th:if="${error}" class="alert alert-danger">
                <p th:text="${error}"></p>
            </div>

            <form th:action="@{/historial/guardar}" th:object="${historial}" method="post">

                <input type="hidden" th:field="*{paciente.id}" />
                <input type="hidden" th:field="*{odontogramaAnotacion}" />

                <!-- DATOS CONSULTA -->
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Fecha</label>
                        <input type="date" class="form-control" th:field="*{fecha}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Motivo de Consulta</label>
                    <input type="text" class="form-control" th:field="*{motivoConsulta}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Síntomas</label>
                    <input type="text" class="form-control" th:field="*{sintomas}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Diagnóstico</label>
                    <input type="text" class="form-control" th:field="*{diagnostico}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Plan de Tratamiento</label>
                    <input type="text" class="form-control" th:field="*{planTratamiento}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <textarea class="form-control" rows="3" th:field="*{observaciones}"></textarea>
                </div>

                <hr>

                <!-- ANTECEDENTES -->
                <h5 class="mb-3">Antecedentes Médicos</h5>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{diabetes}"><label class="form-check-label">Diabetes</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{hipertension}"><label class="form-check-label">Hipertensión</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{alergias}"><label class="form-check-label">Alergias</label></div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{embarazo}"><label class="form-check-label">Embarazo</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{epilepsia}"><label class="form-check-label">Epilepsia</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{prcardiacos}"><label class="form-check-label">Problemas Cardíacos</label></div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{hepatitis}"><label class="form-check-label">Hepatitis</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{enfrenales}"><label class="form-check-label">Enfermedades Renales</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{tbc}"><label class="form-check-label">Tuberculosis (TBC)</label></div>
                    </div>
                </div>

                <hr>

                <!-- COSTOS -->
                <div class="row mt-3">
                    <div class="col-md-4">
                        <label class="form-label">Costo Tratamiento</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{costoTratamiento}" id="costoTratamiento">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Monto Pagado</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{monto}" id="montoPagado">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Saldo</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{saldo}" id="saldo" readonly>
                    </div>
                </div>

                <div id="alertaExceso" class="alert alert-warning mt-3 d-none">
                    ⚠ El monto pagado es mayor al costo del tratamiento.
                </div>

                <div class="mt-4">
                    <button type="submit" id="btnGuardar" class="btn btn-success">Guardar</button>
                    <a class="btn btn-secondary" th:href="@{/historial/paciente/{id}(id=${historial.paciente.id})}">Cancelar</a>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
    const costoInput = document.getElementById("costoTratamiento");
    const pagadoInput = document.getElementById("montoPagado");
    const saldoInput = document.getElementById("saldo");
    const alerta = document.getElementById("alertaExceso");
    const btnGuardar = document.getElementById("btnGuardar");

    function calcularSaldo() {
        let costo = parseFloat(costoInput.value) || 0;
        let pagado = parseFloat(pagadoInput.value) || 0;
        let saldo = costo - pagado;

        saldoInput.value = saldo.toFixed(2);

        if (pagado > costo) {
            alerta.classList.remove("d-none");
            btnGuardar.disabled = true;
        } else {
            alerta.classList.add("d-none");
            btnGuardar.disabled = false;
        }

        if (saldo > 0) {
            saldoInput.classList.add("text-danger");
            saldoInput.classList.remove("text-success");
        } else {
            saldoInput.classList.add("text-success");
            saldoInput.classList.remove("text-danger");
        }
    }

    costoInput.addEventListener("input", calcularSaldo);
    pagadoInput.addEventListener("input", calcularSaldo);

    calcularSaldo();
</script>

</body>
</html>
