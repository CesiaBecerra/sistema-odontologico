<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Pacientes | Digital Dentic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }
        .card-custom{
            border:none;
            border-radius:15px;
            box-shadow:0 8px 18px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card card-custom p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="d-flex align-items-center gap-2">
                <!-- Botón Volver -->
                <button class="btn btn-light btn-sm" onclick="history.back()">
                    <i class="bi bi-arrow-left"></i> Volver
                </button>

                <h3 class="mb-0">
                    <i class="bi bi-people text-primary"></i> Lista de Pacientes
                </h3>
            </div>

            <!-- 🔒 SOLO ADMIN Y SECRETARIO -->
            <a sec:authorize="hasAnyRole('ADMIN','SECRETARIO')"
               href="/pacientes/nuevo"
               class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Nuevo Paciente
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Nombre Completo</th>
                    <th>DNI</th>
                    <th>Teléfono</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p : ${lista}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.nombres + ' ' + p.apellidos}"></td>
                    <td th:text="${p.dni}"></td>
                    <td th:text="${p.telefono}"></td>

                    <td class="text-center">

                        <a th:href="@{/historial/paciente/{id}(id=${p.id})}"
                           class="btn btn-sm btn-info text-white">
                            <i class="bi bi-journal-medical"></i>
                        </a>

                        <!-- 🔒 SOLO ADMIN Y SECRETARIO -->
                        <a sec:authorize="hasAnyRole('ADMIN','SECRETARIO')"
                           th:href="@{/pacientes/eliminar/{id}(id=${p.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Seguro que deseas eliminar este paciente?')">
                            <i class="bi bi-trash"></i>
                        </a>

                    </td>
                </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

</body>
</html>
