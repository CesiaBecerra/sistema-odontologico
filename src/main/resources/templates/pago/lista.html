<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pagos | Digital Dentic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{ background:#f4f6f9; }
        .card-custom{
            border:none;
            border-radius:15px;
            box-shadow:0 8px 18px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="card card-custom p-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-3">

            <div class="d-flex align-items-center gap-3">
                <!-- BOTÓN VOLVER -->
                <button class="btn btn-light btn-sm" onclick="history.back()">
                    <i class="bi bi-arrow-left"></i> Volver
                </button>

                <h3 class="mb-0">
                    <i class="bi bi-cash-coin text-success"></i> Historial de Pagos
                </h3>
            </div>

            <a th:if="${historial != null}"
               th:href="@{/pago/nuevo/{id}(id=${historial.id})}"
               class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Nuevo Pago
            </a>
        </div>

        <!-- ESTADO DEL TRATAMIENTO -->
        <div th:if="${historial != null}" class="mb-4">
            <div class="alert alert-info">
                <strong>Costo Total:</strong>
                <span th:text="'S/ ' + ${historial.costoTratamiento}"></span>
                |
                <strong>Estado:</strong>
                <span th:text="${historial.estadoPago}"></span>
            </div>
        </div>

        <!-- FILTRO -->
        <form th:action="@{/pago/filtrar}" method="get" class="row g-3 mb-3">
            <div class="col-md-4">
                <label class="form-label">Desde</label>
                <input type="date" name="inicio" class="form-control" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Hasta</label>
                <input type="date" name="fin" class="form-control" required>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-funnel"></i> Filtrar
                </button>
            </div>
        </form>

        <a th:href="@{/pago/lista}" class="btn btn-secondary mb-4">
            <i class="bi bi-arrow-clockwise"></i> Limpiar filtro
        </a>

        <!-- RESUMEN -->
        <div th:if="${total != null}" class="row mb-4">

            <div class="col-md-4">
                <div class="card p-3 text-center bg-success text-white">
                    <h6>Total recaudado</h6>
                    <h4 th:text="'S/ ' + ${#numbers.formatDecimal(total,1,'POINT',2,'POINT')}"></h4>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-3">
                    <h6>Pagos por método</h6>
                    <ul class="list-group">
                        <li class="list-group-item d-flex justify-content-between"
                            th:each="m : ${metodos}">
                            <span th:text="${m.key}"></span>
                            <span class="badge bg-primary" th:text="${m.value}"></span>
                        </li>
                    </ul>
                </div>
            </div>

        </div>

        <!-- TABLA -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Comprobante</th>
                    <th>Fecha</th>
                    <th>Monto</th>
                    <th>Método</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p : ${pagos}">
                    <td>
                        <span class="badge bg-dark"
                              th:text="${p.numeroComprobante}">
                        </span>
                    </td>
                    <td th:text="${#temporals.format(p.fechaPago, 'dd/MM/yyyy')}"></td>
                    <td>
                        <span class="badge bg-success"
                              th:text="'S/ ' + ${#numbers.formatDecimal(p.monto,1,'POINT',2,'POINT')}">
                        </span>
                    </td>
                    <td th:text="${p.metodoPago}"></td>
                </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>
</body>
</html>
