<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Pago | Digital Dentic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{ background:#f4f6f9; }
        .card-custom{
            border:none;
            border-radius:15px;
            box-shadow:0 8px 18px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card card-custom p-4 col-md-6 mx-auto">

        <!-- HEADER CON BOTÓN VOLVER -->
        <div class="d-flex align-items-center gap-3 mb-4">
            <button class="btn btn-light btn-sm" onclick="history.back()">
                <i class="bi bi-arrow-left"></i> Volver
            </button>

            <h3 class="mb-0">
                <i class="bi bi-wallet2 text-primary"></i> Registrar Pago
            </h3>
        </div>

        <!-- INFO DEL TRATAMIENTO -->
        <div class="alert alert-info">
            <strong>Costo Total:</strong>
            <span th:text="'S/ ' + ${pago.historial.costoTratamiento}"></span>
            <br>
            <strong>Estado Actual:</strong>
            <span th:text="${pago.historial.estadoPago}"></span>
        </div>

        <form th:action="@{/pago/guardar}" th:object="${pago}" method="post">

            <input type="hidden" name="historialId" th:value="${pago.historial.id}">

            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" th:field="*{fechaPago}" readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Monto a pagar</label>
                <input type="number" step="0.01" min="1"
                       class="form-control"
                       th:field="*{monto}"
                       required>
                <small class="text-muted">
                    Puede registrar pagos parciales.
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label">Método de Pago</label>
                <select class="form-select" th:field="*{metodoPago}" required>
                    <option value="">Seleccione</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Yape">Yape</option>
                    <option value="Plin">Plin</option>
                    <option value="Transferencia">Transferencia</option>
                    <option value="Tarjeta">Tarjeta</option>
                </select>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Guardar Pago
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
