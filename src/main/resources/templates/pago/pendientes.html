<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Tratamientos Pendientes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>

</head>

<body>

<div class="container mt-5">

    <!-- HEADER CON BOTÓN VOLVER -->
    <div class="d-flex align-items-center gap-3 mb-3">
        <button class="btn btn-light btn-sm" onclick="history.back()">
            <i class="bi bi-arrow-left"></i> Volver
        </button>

        <h3 class="mb-0">Tratamientos Pendientes de Pago</h3>
    </div>

    <hr>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>Paciente</th>
                <th>Tratamiento</th>
                <th>Costo Total</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="h : ${historiales}">
                <td th:text="${h.paciente != null ? h.paciente.nombres + ' ' + h.paciente.apellidos : 'Sin paciente'}"></td>
                <td th:text="${h.diagnostico != null ? h.diagnostico : 'Sin detalle'}"></td>
                <td th:text="'S/ ' + ${h.costoTratamiento}"></td>
                <td th:text="${h.estadoPago}"></td>
                <td>
                    <a th:href="@{/pago/nuevo/{id}(id=${h.id})}"
                       class="btn btn-success btn-sm">
                       Registrar Pago
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
