<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Usuarios</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root{
            --dentic-green:#5FA8A6;
            --dentic-blue:#4A79D8;
            --dentic-purple:#8B6CCF;
            --dentic-bg:#F5F7FA;
        }

        body{
            background: var(--dentic-bg);
        }

        .title{
            color: var(--dentic-green);
            font-weight: 700;
        }

        .btn-dentic{
            background: var(--dentic-green);
            color:white;
            border:none;
        }

        .btn-dentic:hover{
            background: var(--dentic-blue);
            color:white;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .table thead{
            background: linear-gradient(90deg,var(--dentic-green),var(--dentic-blue));
            color:white;
        }

        .badge-activo{
            background:var(--dentic-green);
        }

        .badge-inactivo{
            background:var(--dentic-purple);
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div class="d-flex align-items-center gap-3">
            <!-- BOTÓN VOLVER -->
            <button class="btn btn-light btn-sm" onclick="history.back()">
                <i class="bi bi-arrow-left"></i> Volver
            </button>

            <h2 class="title m-0">👥 Lista de Usuarios</h2>
        </div>

        <a th:href="@{/usuarios/nuevo}" class="btn btn-dentic">
            ➕ Nuevo usuario
        </a>
    </div>

    <!-- CARD -->
    <div class="card p-4">

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Activo</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.id}"></td>
                        <td th:text="${u.nombre}"></td>
                        <td th:text="${u.email}"></td>
                        <td th:text="${u.rol}"></td>

                        <td>
                            <span th:if="${u.activo}" class="badge badge-activo">Activo</span>
                            <span th:unless="${u.activo}" class="badge badge-inactivo">Inactivo</span>
                        </td>

                        <td class="text-center">

                            <a th:href="@{'/usuarios/editar/' + ${u.id}}" 
                               class="btn btn-sm btn-outline-primary me-2">
                                ✏
                            </a>

                            <a th:href="@{'/usuarios/eliminar/' + ${u.id}}" 
                               class="btn btn-sm btn-outline-danger">
                                🗑
                            </a>

                        </td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
