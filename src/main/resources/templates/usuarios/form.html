<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Usuario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root{
            --dentic-green:#5FA8A6;
            --dentic-blue:#4A79D8;
            --dentic-purple:#8B6CCF;
            --dentic-bg:#F5F7FA;
        }

        body{
            background: var(--dentic-bg);
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .title{
            color:var(--dentic-green);
            font-weight:700;
        }

        .btn-dentic{
            background:var(--dentic-green);
            color:white;
            border:none;
        }

        .btn-dentic:hover{
            background:var(--dentic-blue);
            color:white;
        }

        .form-control:focus, .form-select:focus{
            border-color:var(--dentic-green);
            box-shadow:0 0 0 0.2rem rgba(95,168,166,.25);
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- TITLE -->
    <h2 class="title mb-4"
        th:text="${usuario.id == null} ? '➕ Nuevo Usuario' : '✏ Editar Usuario'">
    </h2>

    <!-- CARD -->
    <div class="card p-4">

        <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="row g-3">

                <!-- Nombre -->
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" th:field="*{nombre}" required>
                </div>

                <!-- Email -->
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" required>
                </div>

                <!-- Password -->
                <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" th:field="*{password}">
                </div>

                <!-- Rol -->
                <div class="col-md-6">
                    <label class="form-label">Rol</label>
                    <select class="form-select" th:field="*{rol}">
                        <option value="ADMIN">ADMIN</option>
                        <option value="DOCTOR">DOCTOR</option>
                        <option value="SECRETARIO">SECRETARIO</option>
                        <option value="MARKETING">MARKETING</option>
                    </select>
                </div>

                <!-- Activo -->
                <div class="col-12 mt-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" th:field="*{activo}">
                        <label class="form-check-label">Usuario activo</label>
                    </div>
                </div>

            </div>

            <!-- BUTTONS -->
            <div class="mt-4 d-flex gap-2">

                <button type="submit" class="btn btn-dentic">
                    💾 Guardar
                </button>

                <a th:href="@{/usuarios}" class="btn btn-outline-secondary">
                    ↩ Volver
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
