<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Administrador | Digital Dentic</title>

<link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* ===== FONDO ===== */
body{
    background:#f4f7fb;
    font-family:'Segoe UI',sans-serif;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:260px;
    height:100vh;
    position:fixed;
    background:linear-gradient(180deg,#0d6efd,#07a79a);
    color:white;
    padding-top:25px;
}

.sidebar h4{
    text-align:center;
    margin-bottom:30px;
    font-weight:700;
}

.sidebar a, .sidebar form button{
    display:block;
    color:white;
    padding:14px 22px;
    text-decoration:none;
    transition:.3s;
    background:none;
    border:none;
    width:100%;
    text-align:left;
}

.sidebar a:hover, .sidebar form button:hover{
    background:rgba(255,255,255,.2);
    padding-left:30px;
    cursor:pointer;
}

/* ===== CONTENIDO ===== */
.content{
    margin-left:260px;
    padding:30px;
}

/* ===== CARDS ===== */
.module-card{
    border:none;
    border-radius:18px;
    transition:.3s;
    cursor:pointer;
}

.module-card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.module-icon{
    font-size:40px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4>🦷 DIGITAL DENTIC</h4>

    <a th:href="@{/admin/dashboard}">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
    </a>

    <a th:href="@{/usuarios/lista}">
        <i class="bi bi-people me-2"></i> Usuarios
        <small class="text-muted">Gestión de roles del sistema</small>
    </a>

    <a th:href="@{/cita/lista}">
        <i class="bi bi-calendar-check me-2"></i> Citas
        <small class="text-muted">Agenda y control de citas</small>
    </a>

    <a th:href="@{/pacientes}">
        <i class="bi bi-person-vcard me-2"></i> Pacientes
        <small class="text-muted">Historia clínica</small>
    </a>

    <a th:href="@{/marketing}">
        <i class="bi bi-megaphone me-2"></i> Marketing
        <small class="text-muted">Campañas y promociones</small>
    </a>

    <a th:href="@{/pago/lista}">
        <i class="bi bi-cash-coin me-2"></i> Contable
        <small class="text-muted">Ingresos y egresos</small>
    </a>

    <hr class="mx-3">

    <!-- FORMULARIO POST PARA LOGOUT -->
    <form th:action="@{/logout}" method="post">
        <button type="submit">
            <i class="bi bi-box-arrow-right me-2"></i> Cerrar sesión
        </button>
    </form>

</div>

<!-- CONTENIDO -->
<div class="content">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>👑 Panel Administrador</h2>
            <small class="text-muted">Bienvenido al sistema Digital Dentic</small>
        </div>
    </div>

</div>

<script th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
