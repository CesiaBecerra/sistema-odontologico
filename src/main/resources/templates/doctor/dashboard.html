<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Doctor | Digital Dentic</title>

<link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* ===== FONDO ===== */
body{
    background:#f4f7fb;
    font-family:'Segoe UI',sans-serif;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:260px;
    height:100vh;
    position:fixed;
    background:linear-gradient(180deg,#20c997,#0d6efd);
    color:white;
    padding-top:25px;
}

.sidebar h4{
    text-align:center;
    margin-bottom:30px;
    font-weight:700;
}

.sidebar a{
    display:block;
    color:white;
    padding:14px 22px;
    text-decoration:none;
    transition:.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,.2);
    padding-left:30px;
}

/* ===== CONTENIDO ===== */
.content{
    margin-left:260px;
    padding:30px;
}

/* ===== CARDS ===== */
.module-card{
    border:none;
    border-radius:18px;
    transition:.3s;
    cursor:pointer;
}

.module-card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.module-icon{
    font-size:40px;
}

/* ===== FORMULARIO LOGOUT ===== */
.logout-form button{
    display: flex;
    align-items: center;
    gap: 6px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4>🦷 DIGITAL DENTIC</h4>

    <a th:href="@{/doctor/dashboard}">
        <i class="bi bi-speedometer2 me-2"></i> Inicio
    </a>

    <a th:href="@{/cita/lista}">
        <i class="bi bi-calendar-check me-2"></i> Mis citas
    </a>

    <a th:href="@{/pacientes}">
        <i class="bi bi-folder2-open me-2"></i> Pacientes
    </a>

    <hr class="mx-3">

    <!-- FORMULARIO DE LOGOUT FUNCIONAL -->
    <form th:action="@{/logout}" method="post" class="logout-form mx-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="btn btn-link text-white p-0">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </button>
    </form>

</div>

<!-- CONTENIDO -->
<div class="content">
    <h2>👨‍⚕️ Panel Doctor</h2>
    <small class="text-muted">Bienvenido al sistema Digital Dentic</small>
</div>

<script th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
