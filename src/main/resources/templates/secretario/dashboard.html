<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Secretario | Digital Dentic</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:#eef3f7;
        }

        .header-panel{
            background: linear-gradient(90deg,#4e73df,#1cc88a);
            color:white;
            padding:25px;
            border-radius:15px;
            margin-bottom:25px;
        }

        .card-option{
            border:none;
            border-radius:15px;
            box-shadow:0 8px 18px rgba(0,0,0,0.08);
            transition:.2s;
        }

        .card-option:hover{
            transform:translateY(-5px);
            box-shadow:0 15px 25px rgba(0,0,0,0.12);
        }

        .icon-big{
            font-size:45px;
            color:#4e73df;
        }

        .btn-panel{
            border-radius:10px;
            font-weight:600;
        }
    </style>

</head>

<body>

<div class="container mt-4">

    <!-- Header -->
    <div class="header-panel text-center">
        <h2><i class="bi bi-clipboard-check"></i> Panel del Secretario</h2>
        <p class="mb-0">Gestión operativa del sistema</p>
    </div>

    <div class="row g-4">

        <!-- PACIENTES -->
        <div class="col-md-4">
            <div class="card card-option p-4 text-center">
                <i class="bi bi-people icon-big"></i>
                <h5 class="mt-3">Pacientes</h5>
                <a th:href="@{/pacientes/nuevo}" class="btn btn-success btn-panel mt-2 w-100">
                    Registrar paciente
                </a>
                <a th:href="@{/pacientes}" class="btn btn-outline-success btn-panel mt-2 w-100">
                    Ver pacientes
                </a>
            </div>
        </div>

        <!-- CITAS -->
        <div class="col-md-4">
            <div class="card card-option p-4 text-center">
                <i class="bi bi-calendar-check icon-big"></i>
                <h5 class="mt-3">Citas</h5>
                <a th:href="@{/cita/lista}" class="btn btn-primary btn-panel mt-2 w-100">
                    Ver citas programadas
                </a>
            </div>
        </div>

        <!-- PAGOS -->
        <div class="col-md-4">
            <div class="card card-option p-4 text-center">
                <i class="bi bi-cash-coin icon-big"></i>
                <h5 class="mt-3">Pagos</h5>
                <a th:href="@{/pago/pendientes}" class="btn btn-warning btn-panel mt-2 w-100">
                    Registrar pago
                </a>
                <a th:href="@{/pago/lista}" class="btn btn-outline-warning btn-panel mt-2 w-100">
                    Ver pagos
                </a>
            </div>
        </div>

    </div>

    <!-- Logout -->
    <div class="text-center mt-4">
        <a th:href="@{/login}" class="btn btn-danger px-4">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </a>
    </div>

</div>

</body>
</html>
